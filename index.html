<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 Cintaku App</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --pink-light: #FFB3CC;
    --yellow: #FFE66D;
    --peach: #FF8C69;
    --mint: #A8E6CF;
    --lavender: #C9B1FF;
    --white: #FFFDF9;
    --dark: #3D2C4E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 10% 20%, #FFE4F0 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #E8F4FF 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #FFF9E6 0%, transparent 60%);
    z-index: 0;
  }

  .hearts-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .heart-float {
    position: absolute; font-size: 1.2rem; opacity: 0.15;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.15; }
    90%  { opacity: 0.1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  header {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    padding: 20px 24px 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem; color: var(--pink);
    text-shadow: 3px 3px 0px var(--pink-light);
    letter-spacing: 1px;
  }
  .logo span { color: var(--peach); }
  .heart-counter {
    background: linear-gradient(135deg, var(--pink), var(--peach));
    color: white; border-radius: 20px; padding: 6px 14px;
    font-weight: 800; font-size: 0.9rem;
    box-shadow: 0 4px 12px rgba(255,107,157,0.4);
    display: flex; align-items: center; gap: 5px;
  }

  .app {
    position: relative; z-index: 5;
    width: 100%; max-width: 420px;
    padding: 0 20px; flex: 1;
    display: flex; flex-direction: column; align-items: center;
  }

  .swipe-hint {
    font-size: 0.8rem; color: #B0A0C0;
    font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px;
  }

  .card-stack {
    position: relative; width: 100%;
    height: 500px; margin-bottom: 20px;
  }

  .card {
    position: absolute; inset: 0;
    border-radius: 28px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 8px 20px rgba(0,0,0,0.08);
    cursor: grab; user-select: none;
    transform-origin: bottom center;
    will-change: transform;
  }
  .card:active { cursor: grabbing; }
  .card:nth-child(1) { z-index: 5; transform: rotate(0deg); }
  .card:nth-child(2) { z-index: 4; transform: rotate(-3deg) translateY(8px) scale(0.96); }
  .card:nth-child(3) { z-index: 3; transform: rotate(2deg) translateY(16px) scale(0.92); }

  .card-bg {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    position: relative; background: #f0e6f6;
  }

  /* =====================================================
     FOTO — ganti src="FOTO_KAMU.jpg" dengan path foto kamu
     ===================================================== */
  .card-photo {
    width: 100%; flex: 1;
    object-fit: cover; object-position: center top;
    display: block;
  }

  .card-photo-placeholder {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #FFB3CC 0%, #FF6B9D 100%);
    gap: 12px; color: white;
  }
  .ph-emoji { font-size: 5rem; animation: bounceSoft 2s ease-in-out infinite; }
  .ph-text {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem; opacity: 0.8;
    text-align: center; padding: 0 20px;
  }
  @keyframes bounceSoft {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-10px) scale(1.05); }
  }

  .card-gradient {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(30,10,50,0.88) 0%, transparent 100%);
    border-radius: 0 0 28px 28px;
  }
  .card-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 22px; color: white;
  }
  .card-name {
    font-family: 'Fredoka One', cursive; font-size: 1.8rem;
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .age-badge {
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    background: rgba(255,255,255,0.25); padding: 2px 10px;
    border-radius: 20px; backdrop-filter: blur(4px);
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag {
    background: rgba(255,255,255,0.2); backdrop-filter: blur(4px);
    border-radius: 20px; padding: 4px 10px; font-size: 0.72rem;
    font-weight: 700; color: white; border: 1px solid rgba(255,255,255,0.3);
  }
  .card-bio { font-size: 0.82rem; opacity: 0.85; margin-top: 6px; line-height: 1.4; font-weight: 600; }

  .stamp {
    position: absolute; top: 30px;
    font-family: 'Fredoka One', cursive; font-size: 2.5rem;
    padding: 8px 18px; border-radius: 12px; border: 5px solid;
    opacity: 0; transition: opacity 0.1s; z-index: 10; pointer-events: none;
  }
  .stamp-like {
    right: 20px; color: #4CAF50; border-color: #4CAF50;
    background: rgba(76,175,80,0.1); transform: rotate(-15deg);
  }

  /* Tombol like besar & pulsing */
  .actions {
    display: flex; align-items: center;
    justify-content: center; gap: 20px; margin-bottom: 24px;
  }
  .btn-like-big {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--pink), var(--peach));
    border-radius: 50%;
    box-shadow: 0 8px 28px rgba(255,107,157,0.5);
    font-size: 2rem; border: none; color: white;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulseLike 2s ease-in-out infinite;
  }
  .btn-like-big:hover { transform: scale(1.1); box-shadow: 0 12px 36px rgba(255,107,157,0.6); }
  .btn-like-big:active { transform: scale(0.92); }
  @keyframes pulseLike {
    0%, 100% { box-shadow: 0 8px 28px rgba(255,107,157,0.5); }
    50%       { box-shadow: 0 8px 40px rgba(255,107,157,0.85); }
  }
  .like-label {
    font-family: 'Fredoka One', cursive; color: var(--pink);
    font-size: 0.9rem; text-align: center;
    margin-top: -10px; margin-bottom: 16px; letter-spacing: 1px;
  }

  /* Match overlay */
  .match-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(255,107,157,0.97), rgba(255,140,105,0.97));
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s; padding: 30px; text-align: center;
  }
  .match-overlay.show { opacity: 1; pointer-events: all; }

  .match-emojis { font-size: 4rem; margin-bottom: 12px; animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
  .match-title {
    font-family: 'Fredoka One', cursive; font-size: 2.8rem;
    color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    margin-bottom: 8px;
    animation: popIn 0.5s 0.1s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .match-sub {
    color: rgba(255,255,255,0.92); font-size: 1rem;
    font-weight: 700; margin-bottom: 36px; line-height: 1.5;
  }
  .match-buttons { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 280px; }

  /* =====================================================
     TOMBOL WA — ganti href jadi nomor WA kamu
     Format: https://wa.me/62XXXXXXXXXX
     ===================================================== */
  .btn-wa {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #25D366; color: white; text-decoration: none;
    padding: 16px 28px; border-radius: 30px;
    font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    box-shadow: 0 8px 24px rgba(37,211,102,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: popIn 0.5s 0.2s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .btn-wa:hover { transform: scale(1.05); box-shadow: 0 12px 32px rgba(37,211,102,0.5); }
  .btn-wa-icon { font-size: 1.4rem; }

  .btn-lanjut {
    background: rgba(255,255,255,0.25); color: white;
    border: 2px solid rgba(255,255,255,0.5); padding: 13px 28px;
    border-radius: 30px; font-family: 'Fredoka One', cursive;
    font-size: 1rem; cursor: pointer; transition: background 0.2s;
    animation: popIn 0.5s 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .btn-lanjut:hover { background: rgba(255,255,255,0.35); }

  @keyframes popIn {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .confetti-piece {
    position: fixed; animation: confettiFall 2.5s ease-in forwards;
    z-index: 200; pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .empty-state {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    height: 500px; text-align: center; gap: 16px;
  }
  .empty-state.show { display: flex; }
  .empty-emoji { font-size: 5rem; animation: bounceSoft 2s ease-in-out infinite; }
  .empty-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--dark); }
  .empty-sub { color: #A090B0; font-weight: 600; font-size: 0.9rem; max-width: 260px; line-height: 1.5; }
  .refresh-btn {
    background: linear-gradient(135deg, var(--pink), var(--peach));
    color: white; border: none; padding: 12px 28px;
    border-radius: 24px; font-family: 'Fredoka One', cursive;
    font-size: 1rem; cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,157,0.4);
    transition: transform 0.2s;
  }
  .refresh-btn:hover { transform: scale(1.05); }

  .bottom-nav {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    padding: 10px 30px 30px;
    display: flex; justify-content: space-around; align-items: center;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; font-size: 0.65rem; color: #C0B0D0;
    font-weight: 700; cursor: pointer; transition: color 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .nav-item.active { color: var(--pink); }
  .nav-item .nav-icon { font-size: 1.4rem; }
  .nav-dot { width: 5px; height: 5px; background: var(--pink); border-radius: 50%; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<header>
  <div class="logo">Cinta<span>ku</span> 💕</div>
  <div class="heart-counter">❤️ <span id="likeCount">0</span> Suka</div>
</header>

<div class="app">
  <div class="swipe-hint">✨ Geser kanan atau tekan 💖 untuk suka ✨</div>
  <div class="card-stack" id="cardStack"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">🥺</div>
    <div class="empty-title">Semua Kartu Habis!</div>
    <div class="empty-sub">Kamu sudah lihat semua sisi terbaik dari aku 💕</div>
    <button class="refresh-btn" onclick="resetCards()">🔄 Lihat Lagi</button>
  </div>
  <div class="actions" id="actionBtns">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <button class="btn-like-big" onclick="swipeCard()">💖</button>
      <div class="like-label">SUKA</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active"><div class="nav-icon">🏠</div><span>Home</span><div class="nav-dot"></div></div>
  <div class="nav-item"><div class="nav-icon">💌</div><span>Pesan</span></div>
  <div class="nav-item"><div class="nav-icon">👤</div><span>Profil</span></div>
</div>

<!-- Match Overlay -->
<div class="match-overlay" id="matchOverlay">
  <div class="match-emojis">💖✨💖</div>
  <div class="match-title">It's a Match!</div>
  <div class="match-sub">Yay! Kamu suka aku!<br>Yuk langsung chat sekarang 🥰</div>
  <div class="match-buttons">

    <!-- =====================================================
         GANTI NOMOR WA: ubah 628XXXXXXXXXX jadi nomor WA kamu
         Contoh: https://wa.me/6281234567890
         ===================================================== -->
    <a class="btn-wa" href="https://wa.me/6282126541430" target="_blank" id="waButton">
      <span class="btn-wa-icon">💬</span>
      Chat di WhatsApp
    </a>

    <button class="btn-lanjut" onclick="closeMatch()">Lanjut Lihat Kartu 💕</button>
  </div>
</div>

<script>
/* =====================================================
   KONFIGURASI — edit bagian ini sesuai keinginan kamu

   FOTO: ganti null dengan nama file foto atau link
         Contoh: photo: "foto.jpg"
                 photo: "https://link.com/gambar.jpg"

   NOMOR WA: ganti 628XXXXXXXXXX di bawah
             Contoh: "6281234567890"
   ===================================================== */

const NOMOR_WA = "628XXXXXXXXXX"; // ← GANTI NOMOR WA KAMU

const cards = [
  {
    photo: "1.jpeg",                          // ← GANTI: "foto1.jpg"
    name: "ATHAR",                    // ← GANTI NAMA
    age: "20",                            // ← GANTI UMUR
    bio: "Hai! Kenalan yuk, aku orangnya seru kok 😊",
    tags: ["💕 Friendly", "😄 Funny", "🌟 Spesial"],
  },
  {
    photo: "2.jpeg",                          // ← GANTI: "foto2.jpg"
    name: "AMAR",
    age: "20",
    bio: "Suka ketawa bareng dan makan enak 🍜",
    tags: ["🍜 Foodie", "😂 Humoris", "🎵 Musik"],
  },
  {
    photo: "3.jpeg",                          // ← GANTI: "foto3.jpg"
    name: "ARTHUR",
    age: "20",
    bio: "Kalau udah kenal aku, susah lupain aku 😜💕",
    tags: ["🌙 Romantic", "💖 Caring", "✨ Unik"],
  },
  {
    photo: "4.jpeg",                          // ← GANTI: "foto4.jpg"
    name: "AMHAR",
    age: "20",
    bio: "Siap jadi partner terbaik kamu selamanya 🫂",
    tags: ["🏠 Homey", "💛 Hangat", "🌻 Positif"],
  },
];

/* ===================================================== */

let currentIndex = 0;
let likeCount = 0;

function buildCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  const remaining = cards.slice(currentIndex);

  if (remaining.length === 0) {
    document.getElementById('emptyState').classList.add('show');
    document.getElementById('actionBtns').style.opacity = '0';
    document.getElementById('actionBtns').style.pointerEvents = 'none';
    return;
  }

  document.getElementById('emptyState').classList.remove('show');
  document.getElementById('actionBtns').style.opacity = '1';
  document.getElementById('actionBtns').style.pointerEvents = 'all';

  remaining.slice(0, 3).reverse().forEach(card => stack.appendChild(createCardEl(card)));
  addDragEvents(stack.lastElementChild);
}

function createCardEl(card) {
  const div = document.createElement('div');
  div.className = 'card';
  const photoHtml = card.photo
    ? `<img class="card-photo" src="${card.photo}" alt="${card.name}" />`
    : `<div class="card-photo-placeholder">
         <div class="ph-emoji">📸</div>
         <div class="ph-text">Ganti dengan foto kamu!</div>
       </div>`;
  div.innerHTML = `
    <div class="card-bg">
      ${photoHtml}
      <div class="card-gradient"></div>
      <div class="card-info">
        <div class="card-name">${card.name} <span class="age-badge">${card.age}</span></div>
        <div class="card-bio">${card.bio}</div>
        <div class="card-tags">${card.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="stamp stamp-like">SUKA 💖</div>
    </div>`;
  return div;
}

function addDragEvents(el) {
  let isDragging = false, startX = 0, startY = 0, currentX = 0;

  const onStart = (e) => {
    isDragging = true;
    const p = e.touches ? e.touches[0] : e;
    startX = p.clientX; startY = p.clientY;
    el.style.transition = 'none';
  };
  const onMove = (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const p = e.touches ? e.touches[0] : e;
    currentX = p.clientX - startX;
    const cy = p.clientY - startY;
    el.style.transform = `translate(${currentX}px, ${cy * 0.3}px) rotate(${currentX * 0.08}deg)`;
    el.querySelector('.stamp-like').style.opacity = currentX > 40 ? Math.min(currentX/80,1) : 0;
  };
  const onEnd = () => {
    if (!isDragging) return;
    isDragging = false;
    el.style.transition = 'transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';

    if (currentX > 80) {
      doLike(el);
    } else if (currentX < -80) {
      // Tidak bisa skip — kartu balik & goyang
      el.style.transform = 'rotate(0deg)';
      el.querySelector('.stamp-like').style.opacity = 0;
      shakeCard(el);
      showNoSkipHint();
    } else {
      el.style.transform = 'rotate(0deg)';
      el.querySelector('.stamp-like').style.opacity = 0;
    }
    currentX = 0;
  };

  el.addEventListener('mousedown', onStart);
  el.addEventListener('mousemove', onMove);
  el.addEventListener('mouseup', onEnd);
  el.addEventListener('touchstart', onStart, { passive: false });
  el.addEventListener('touchmove', onMove, { passive: false });
  el.addEventListener('touchend', onEnd);
}

function doLike(el) {
  el.style.transition = 'transform 0.5s ease-in, opacity 0.5s ease-in';
  el.style.transform = `translateX(${window.innerWidth * 1.5}px) rotate(30deg)`;
  el.style.opacity = '0';
  currentIndex++;
  likeCount++;
  document.getElementById('likeCount').textContent = likeCount;
  setTimeout(() => showMatch(), 500);
}

function swipeCard() {
  const stack = document.getElementById('cardStack');
  const topCard = stack.lastElementChild;
  if (!topCard || currentIndex >= cards.length) return;
  doLike(topCard);
}

function shakeCard(el) {
  const frames = [3, -3, 2, -2, 0];
  frames.forEach((deg, i) => {
    setTimeout(() => {
      el.style.transition = 'transform 0.08s';
      el.style.transform = `rotate(${deg}deg)`;
    }, i * 80);
  });
}

function showNoSkipHint() {
  let hint = document.getElementById('noSkipHint');
  if (!hint) {
    hint = document.createElement('div');
    hint.id = 'noSkipHint';
    hint.style.cssText = `
      position:fixed; bottom:160px; left:50%; transform:translateX(-50%);
      background:rgba(50,20,60,0.88); color:white; padding:10px 22px;
      border-radius:20px; font-family:'Fredoka One',cursive; font-size:1rem;
      z-index:50; pointer-events:none; white-space:nowrap;
      backdrop-filter:blur(6px); transition:opacity 0.3s;
    `;
    document.body.appendChild(hint);
  }
  hint.textContent = '💖 Harus suka dulu dong!';
  hint.style.opacity = '1';
  clearTimeout(hint._t);
  hint._t = setTimeout(() => hint.style.opacity = '0', 1800);
}

function showMatch() {
  document.getElementById('waButton').href = `https://wa.me/${NOMOR_WA}`;
  document.getElementById('matchOverlay').classList.add('show');
  spawnConfetti();
}

function closeMatch() {
  document.getElementById('matchOverlay').classList.remove('show');
  setTimeout(buildCards, 200);
}

function resetCards() {
  currentIndex = 0; likeCount = 0;
  document.getElementById('likeCount').textContent = '0';
  buildCards();
}

function spawnConfetti() {
  const colors = ['#FF6B9D','#FFE66D','#A8E6CF','#C9B1FF','#FF8C69','#25D366'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}vw; top:-20px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${Math.random()*10+6}px; height:${Math.random()*10+6}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${Math.random()*1.5+1.5}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

function spawnHearts() {
  const bg = document.getElementById('heartsBg');
  ['💕','❤️','🌸','✨','💫','⭐','🦋'].forEach(e => {
    for (let i = 0; i < 2; i++) {
      const h = document.createElement('div');
      h.className = 'heart-float'; h.textContent = e;
      h.style.left = Math.random()*100+'vw';
      h.style.animationDuration = (Math.random()*8+6)+'s';
      h.style.animationDelay = (Math.random()*8)+'s';
      h.style.fontSize = (Math.random()*1.2+0.6)+'rem';
      bg.appendChild(h);
    }
  });
}

spawnHearts();
buildCards();
</script>
</body>
</html>
